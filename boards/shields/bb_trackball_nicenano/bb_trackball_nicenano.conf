# =============================================================================
# Kconfig — keyboard.conf
# Enable ZMK pointing / HID mouse support and the analog-input driver.
# =============================================================================

# --- Core pointing support ---------------------------------------------------
# Enables the ZMK mouse HID report descriptor so the device enumerates as a
# combined keyboard + mouse over USB/BLE.
CONFIG_ZMK_POINTING=y

# --- Analog Input Driver -----------------------------------------------------
# Required by the zmk-analog-input-driver module (badjeff).
# This is what we use to convert the BB trackball's four GPIO hall-sensor
# outputs into ZMK input_event (REL_X / REL_Y) pairs.
CONFIG_ANALOG_INPUT=y

# --- GPIO interrupt support --------------------------------------------------
# The hall sensors produce fast transitions; GPIO interrupts give us low
# latency without polling.
CONFIG_GPIO=y

# --- Optional: logging -------------------------------------------------------
# Uncomment while debugging to see raw trackball events in RTT/USB log.
# CONFIG_ZMK_LOG_LEVEL_DBG=y
# CONFIG_ANALOG_INPUT_LOG_LEVEL_DBG=y
